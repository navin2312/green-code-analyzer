name: 'Green Code Analyzer'
description: >
  Detect energy anti-patterns in JavaScript and Python pull request diffs.
  Posts a detailed report as a PR comment including an energy-efficiency grade,
  estimated CO₂ savings, and per-pattern suggestions.

author: 'Green Code Team'

branding:
  icon:  'zap'
  color: 'green'

inputs:
  github-token:
    description: >
      GitHub token used to fetch the PR diff and post the comment.
      Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

  fail-on-issues:
    description: >
      Set to 'true' to fail (exit code 1) if any energy anti-patterns are
      found above the severity threshold. Useful for enforcing a green gate.
    required: false
    default: 'false'

  severity-threshold:
    description: >
      Minimum severity level to report.
      One of: low | medium | high | critical.
      Issues below this level are silently ignored.
    required: false
    default: 'low'

  llm-enabled:
    description: >
      Set to 'true' to enable Phase 2 LLM semantic analysis.
      Auto-enabled if groq-api-key or anthropic-api-key is provided.
    required: false
    default: 'false'

  groq-api-key:
    description: >
      Groq API key for cloud LLM analysis (free tier available at console.groq.com).
      When set, Phase 2 is automatically enabled using llama3-8b-8192.
      Store as a GitHub Secret: secrets.GROQ_API_KEY
    required: false
    default: ''

  anthropic-api-key:
    description: >
      Anthropic API key for cloud LLM analysis using Claude.
      Used if groq-api-key is not set. Phase 2 auto-enabled when provided.
      Store as a GitHub Secret: secrets.ANTHROPIC_API_KEY
    required: false
    default: ''

  llm-endpoint:
    description: >
      URL of the Ollama API endpoint (local fallback, no API key needed).
      Only used if neither groq-api-key nor anthropic-api-key is set.
    required: false
    default: 'http://localhost:11434'

  llm-model:
    description: >
      Ollama model to use for semantic analysis (local fallback only).
      Recommended: codellama, deepseek-coder, mistral, llama3.
    required: false
    default: 'codellama'

outputs:
  energy-score:
    description: 'Total energy anti-pattern score (sum of energyPoints across all findings)'

  grade:
    description: 'Energy efficiency grade: A+, A, B, C, or D'

  findings-count:
    description: 'Number of energy anti-patterns detected above the severity threshold'

runs:
  using: 'node20'
  main:  'dist/index.js'
